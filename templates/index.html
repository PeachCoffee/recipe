<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>Input 3 Ingredients</h2>

    <form action="/generate_recipe" method="post">

        <!-- 재료 입력 -->
        <div class="input-group">
            <input
                type="text"
                name="ingredient"
                placeholder="Ingredient 1"
                required
            >

            <input
                type="text"
                name="ingredient"
                placeholder="Ingredient 2"
                required
            >

            <input
                type="text"
                name="ingredient"
                placeholder="Ingredient 3"
                required
            >
        </div>

        <!-- 요리 종류 선택 -->
        <label class="subheading" for="cuisine">
            Choose a cuisine:
        </label>

        <select name="cuisine" id="cuisine">
            {% for cuisine in cuisines %}
            <option value="{{ cuisine|lower|replace(' ', '_') }}">
                {{ cuisine }}
            </option>
            {% endfor %}
        </select>

        <!-- 식이 제한 선택 -->
        <label class="subheading" for="restrictions">
            Dietary Restrictions:
        </label>

        <div class="checkbox-container">
            {% for restriction in dietary_restrictions %}
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        name="restrictions"
                        value="{{ restriction|lower|replace(' ', '_') }}"
                    >
                    {{ restriction }}
                </label>
            </div>
            {% endfor %}
        </div>

        <!-- 언어 선택 -->
        <label class="subheading" for="language">
            Choose a language:
        </label>

        <select name="language" id="language">
            {% for language in languages %}
            <option value="{{ language|lower|replace(' ', '_') }}">
                {{ language }}
            </option>
            {% endfor %}
        </select>

        <!-- 제출 버튼 -->
        <input
            type="submit"
            value="Generate Recipe"
            class="submit-btn"
        >

    </form>
</div>

</body>
</html>
